name: Version Bump

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine bump type from commit message
        id: bump
        run: |
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -qiE '^feat!:|^fix!:|^refactor!:|BREAKING CHANGE'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qiE '^feat'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qiE '^fix|^perf|^refactor'; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in plugin files
        if: steps.bump.outputs.type != 'none'
        run: |
          BUMP=${{ steps.bump.outputs.type }}
          CURRENT=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $CURRENT → $NEW ($BUMP)"

          python3 -c "
          import json
          for f in ['.claude-plugin/plugin.json', '.claude-plugin/marketplace.json']:
              data = json.load(open(f))
              if 'version' in data:
                  data['version'] = '$NEW'
              if 'plugins' in data:
                  for p in data['plugins']:
                      if 'version' in p:
                          p['version'] = '$NEW'
              json.dump(data, open(f, 'w'), indent=2)
              # Add trailing newline
              with open(f, 'a') as fh:
                  fh.write('\n')
          "

      - name: Commit and push
        if: steps.bump.outputs.type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to $NEW"
          git tag "v$NEW"
          git push && git push --tags
